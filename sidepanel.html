<html lang="en">
  <head>
    <title>HTSP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tab-manager/tab-manager.css">
    <link rel="stylesheet" href="media-downloader/media-downloader.css">
  </head>
  <body>
    <div id="header">
      <div class="tabs">
        <div class="tab active" data-target="tab-manager-container">Tab Manager</div>
        <div class="tab" data-target="chatgpt-frame">ChatGPT</div>
        <div class="tab" data-target="gemini-frame">Gemini</div>
        <div class="tab" data-target="media-downloader-container">Media Downloader</div>
        <div class="tab" data-target="page-capture-container">Page Capture</div>
      </div>
      <div class="dropdown">
        <button id="dropdown-btn" class="dropdown-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M18 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
          </svg>
        </button>
        <div id="dropdown-content" class="dropdown-content">
          <!-- Dropdown items will be populated by JS -->
        </div>
      </div>
    </div>

    <div class="iframe-container">
      <div id="media-downloader-container" class="ai-frame">
        <div id="media-downloader-header" style="padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin: 0; font-size: 14px; font-weight: 500;">Media Downloader</h3>
          <button id="refresh-media-btn" class="action-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4" /><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4" /></svg>
          </button>
        </div>
        <div id="media-toolbar" class="media-toolbar">
          <label class="checkbox-container">
            <input type="checkbox" id="select-all-media" />
            <span class="checkmark"></span>
            Select All
          </label>
          <div class="toolbar-actions">
            <select id="media-type-filter" class="styled-select">
              <option value="all" selected>All Types</option>
              <option value="image">Images</option>
              <option value="video">Videos</option>
            </select>
            <button id="cancel-downloads-btn" class="action-btn cancel-btn hidden">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M18 6l-12 12" /><path d="M6 6l12 12" /></svg>
              Cancel
            </button>
            <button id="download-selected-btn" class="action-btn download-selected-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" /><path d="M7 11l5 5l5 -5" /><path d="M12 4l0 12" /></svg>
              Selected
            </button>
          </div>
        </div>
        <div id="media-list-container">
          <!-- Media items will be rendered here -->
        </div>
        
        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="modal hidden">
          <div class="modal-content">
            <h4 id="confirm-modal-title">Confirm Download</h4>
            <p id="confirm-modal-text">Calculating size...</p>
            <div class="modal-actions">
              <button id="modal-cancel-btn" class="modal-btn secondary-btn">Cancel</button>
              <button id="modal-ok-btn" class="modal-btn primary-btn disabled" disabled>OK</button>
            </div>
          </div>
        </div>
      </div>
      <div id="tab-manager-container" class="ai-frame hidden">
        <div id="tab-manager-header"></div>
        <label for="search-box"></label>
        <input type="text" id="search-box" placeholder="Search tabs...">
        <div id="window-groups-container">
          <!-- Window groups will be rendered here by JS -->
        </div>
      </div>
      <div id="page-capture-container" class="ai-frame hidden">
        <div id="page-capture-header" style="padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin: 0; font-size: 14px; font-weight: 500;">Page Capture</h3>
        </div>
        <div class="capture-toolbar" style="padding: 10px; display: flex; justify-content: center; border-bottom: 1px solid var(--border-color);">
          <button id="capture-btn" class="action-btn" style="width: 100%; justify-content: center; padding: 8px; border-radius: 4px; background: var(--bg-hover);">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 8v-2a2 2 0 0 1 2 -2h2" /><path d="M4 16v2a2 2 0 0 0 2 2h2" /><path d="M16 4h2a2 2 0 0 1 2 2v2" /><path d="M16 20h2a2 2 0 0 0 2 -2v-2" /><circle cx="12" cy="12" r="3" /></svg>
            Capture Full Page
          </button>
        </div>
        <div id="capture-loading" class="hidden" style="padding: 20px; text-align: center; color: var(--text-color);">
          <p>Capturing page, please wait...</p>
        </div>
        <div id="capture-preview-container" class="hidden" style="padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-y: auto;">
          <div style="position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px;">
            <img id="capture-preview-img" style="max-width: 100%; max-height: 250px; object-fit: contain; border: 1px solid var(--border-color); border-radius: 4px; cursor: zoom-in; background: #f0f0f0;" title="Click to view full size" />
            <span style="font-size: 11px; color: var(--text-color); opacity: 0.7; margin-top: 5px;">Click image to enlarge</span>
          </div>
          <div style="display: flex; gap: 10px; width: 100%;">
            <button id="copy-capture-btn" class="action-btn" style="flex: 1; justify-content: center; padding: 8px; border-radius: 4px; background: var(--bg-hover);">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 8m0 2a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2z" /><path d="M16 8v-2a2 2 0 0 0 -2 -2h-8a2 2 0 0 0 -2 2v8a2 2 0 0 0 2 2h2" /></svg>
              Copy
            </button>
            <button id="download-capture-btn" class="action-btn" style="flex: 1; justify-content: center; padding: 8px; border-radius: 4px; background: var(--bg-hover);">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2" /><path d="M7 11l5 5l5 -5" /><path d="M12 4l0 12" /></svg>
              Save
            </button>
          </div>
        </div>
      </div>
      <iframe id="chatgpt-frame" class="ai-frame hidden" src="https://chatgpt.com/" allow="clipboard-write; microphone"></iframe>
      <iframe id="gemini-frame" class="ai-frame hidden" src="https://gemini.google.com/app" allow="clipboard-write; microphone"></iframe>
    </div>
    <script src="sidepanel.js"></script>
    <script src="tab-manager/tab-manager.js"></script>
    <script src="media-downloader/media-downloader.js"></script>
    <script src="page-capture/page-capture.js"></script>
    <script src="init.js"></script>
  </body>
</html>
